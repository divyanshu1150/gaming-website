  <!-- Decision boxes -->
  <rect x="120" y="185" width="80" height="30" rx="4" fill="#2ecc71" opacity="0.8"/>
  <rect x="120" y="222" width="80" height="30" rx="4" fill="#e74c3c" opacity="0.8"/>
  <rect x="312" y="185" width="80" height="30" rx="4" fill="#2ecc71" opacity="0.8"/>
  <rect x="312" y="222" width="80" height="30" rx="4" fill="#e74c3c" opacity="0.8"/>
  <text x="160" y="205" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">COOPERATE</text>
  <text x="160" y="242" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">CHEAT</text>
  <text x="352" y="205" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">COOPERATE</text>
  <text x="352" y="242" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">CHEAT</text>
