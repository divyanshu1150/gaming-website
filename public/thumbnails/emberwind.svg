<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0510;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="512" height="384" fill="url(#bg)"/>
  <ellipse cx="256" cy="180" rx="120" ry="100" fill="url(#glow)"/>
  <!-- Platform -->
  <rect x="100" y="240" width="312" height="18" rx="4" fill="#5a3a1a" opacity="0.9"/>
  <rect x="140" y="200" width="100" height="18" rx="4" fill="#5a3a1a" opacity="0.8"/>
  <rect x="270" y="210" width="80" height="18" rx="4" fill="#5a3a1a" opacity="0.8"/>
  <!-- Character silhouette -->
  <ellipse cx="220" cy="192" rx="12" ry="12" fill="#ff8c00" opacity="0.9"/>
  <rect x="213" y="200" width="14" height="28" rx="3" fill="#cc5500" opacity="0.9"/>
  <!-- Sword -->
  <line x1="227" y1="205" x2="255" y2="180" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <!-- Flames / particles -->
  <circle cx="180" cy="220" r="5" fill="#ff4400" opacity="0.7"/>
  <circle cx="300" cy="215" r="4" fill="#ff6600" opacity="0.6"/>
  <circle cx="260" cy="195" r="6" fill="#ff8800" opacity="0.5"/>
  <circle cx="170" cy="235" r="3" fill="#ff2200" opacity="0.8"/>
  <!-- Title -->
  <text x="256" y="296" font-family="system-ui,sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#ff6600">Emberwind</text>
  <text x="256" y="336" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#ff8c00" fill-opacity="0.7">Action Platformer · Free · No Ads</text>
</svg>
