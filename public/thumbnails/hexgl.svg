<svg xmlns="http://www.w3.org/2000/svg" width="512" height="384" viewBox="0 0 512 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000010;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="512" height="384" fill="url(#bg)"/>
  <!-- Track lines -->
  <rect x="80" y="160" width="352" height="3" fill="url(#track)" rx="2"/>
  <rect x="80" y="200" width="352" height="3" fill="url(#track)" rx="2"/>
  <!-- Ship/racer -->
  <polygon points="256,120 296,170 256,155 216,170" fill="#00d4ff" opacity="0.9"/>
  <rect x="246" y="155" width="20" height="30" rx="3" fill="#0066aa" opacity="0.8"/>
  <!-- Speed lines -->
  <line x1="100" y1="140" x2="160" y2="140" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="80" y1="150" x2="150" y2="150" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="350" y1="140" x2="410" y2="140" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="360" y1="150" x2="430" y2="150" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Title -->
  <text x="256" y="280" font-family="system-ui,sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#00d4ff">HexGL</text>
  <text x="256" y="320" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#00d4ff" fill-opacity="0.6">3D Racing · Free · No Ads</text>
</svg>
