<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 900;
    color: #a78bfa;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 0.8rem; color: #4b5563; margin-bottom: 18px; }

  /* Match tracker */
  .match-track {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .pip {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid #2d2d4e;
    background: #1a1a2e;
    transition: background 0.3s, border-color 0.3s;
  }
  .pip.won  { background: #4ade80; border-color: #16a34a; }
  .pip.lost { background: #f87171; border-color: #dc2626; }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .score-box {
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
    min-width: 80px;
  }
  .score-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .score-value { font-size: 1.5rem; font-weight: 700; }
  .score-box.you   .score-value { color: #818cf8; }
  .score-box.tie   .score-value { color: #fbbf24; }
  .score-box.cpu   .score-value { color: #f472b6; }

  /* Arena */
  .arena {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 400px;
  }
  .player-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .player-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .choice-display {
    font-size: 4rem;
    width: 90px; height: 90px;
    background: #1a1a2e;
    border: 2px solid #2d2d4e;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .choice-display.reveal { animation: revealBounce 0.4s ease; }
  @keyframes revealBounce {
    0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    70%  { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .vs { font-size: 1.2rem; font-weight: 900; color: #4b5563; }

  #result {
    font-size: 1.4rem;
    font-weight: 700;
    min-height: 36px;
    margin-bottom: 12px;
    text-align: center;
  }
  .result-win  { color: #4ade80; }
  .result-lose { color: #f87171; }
  .result-draw { color: #fbbf24; }

  /* Choices */
  .choices {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
  }
  .choice-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: #1a1a2e;
    border: 2px solid #2d2d4e;
    border-radius: 16px;
    padding: 14px 20px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover { border-color: #4c4c7f; background: #252540; transform: translateY(-4px); }
  .choice-btn:active { transform: scale(0.92); }
  .choice-btn .emoji { font-size: 2.6rem; }
  .choice-btn .name  { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .choice-btn.disabled { opacity: 0.4; pointer-events: none; }

  .btn {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 28px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn:hover { opacity: 0.85; }

  #matchResult {
    font-size: 1.1rem;
    font-weight: 700;
    color: #a78bfa;
    min-height: 28px;
    margin-bottom: 10px;
    text-align: center;
  }
</style>
</head>
<body>
<h1>ROCK PAPER SCISSORS</h1>
<p class="subtitle">Best of 5 — First to 3 wins!</p>

<!-- Match pip tracker -->
<div class="match-track" id="pips"></div>

<div class="scoreboard">
  <div class="score-box you">
    <div class="score-label">You</div>
    <div class="score-value" id="youScore">0</div>
  </div>
  <div class="score-box tie">
    <div class="score-label">Ties</div>
    <div class="score-value" id="tieScore">0</div>
  </div>
  <div class="score-box cpu">
    <div class="score-label">CPU</div>
    <div class="score-value" id="cpuScore">0</div>
  </div>
</div>

<div class="arena">
  <div class="player-side">
    <div class="player-label">You</div>
    <div class="choice-display" id="youDisplay">🤔</div>
  </div>
  <div class="vs">VS</div>
  <div class="player-side">
    <div class="player-label">CPU</div>
    <div class="choice-display" id="cpuDisplay">🤔</div>
  </div>
</div>

<div id="result"></div>

<div class="choices" id="choices">
  <div class="choice-btn" onclick="play('rock')">
    <span class="emoji">🪨</span>
    <span class="name">Rock</span>
  </div>
  <div class="choice-btn" onclick="play('paper')">
    <span class="emoji">📄</span>
    <span class="name">Paper</span>
  </div>
  <div class="choice-btn" onclick="play('scissors')">
    <span class="emoji">✂️</span>
    <span class="name">Scissors</span>
  </div>
</div>

<div id="matchResult"></div>
<button class="btn" id="newMatchBtn" style="display:none" onclick="newMatch()">New Match</button>

<script>
const EMOJIS = { rock: '🪨', paper: '📄', scissors: '✂️' };
const OPTIONS = ['rock', 'paper', 'scissors'];
// Wins against: beats[a] === b means a beats b
const BEATS = { rock: 'scissors', scissors: 'paper', paper: 'rock' };

let youScore, cpuScore, tieScore, roundNum, matchOver;

function newMatch() {
  youScore = 0; cpuScore = 0; tieScore = 0; roundNum = 0; matchOver = false;
  document.getElementById('youScore').textContent = 0;
  document.getElementById('cpuScore').textContent = 0;
  document.getElementById('tieScore').textContent = 0;
  document.getElementById('youDisplay').textContent = '🤔';
  document.getElementById('cpuDisplay').textContent = '🤔';
  document.getElementById('result').textContent = '';
  document.getElementById('matchResult').textContent = '';
  document.getElementById('newMatchBtn').style.display = 'none';
  setChoicesDisabled(false);
  buildPips();
}

function buildPips() {
  const pip = document.getElementById('pips');
  pip.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'pip';
    d.id = 'pip' + i;
    pip.appendChild(d);
  }
}

function play(choice) {
  if (matchOver) return;
  setChoicesDisabled(true);

  const cpu = OPTIONS[Math.floor(Math.random() * 3)];
  // Show ?
  document.getElementById('youDisplay').textContent = '⏳';
  document.getElementById('cpuDisplay').textContent = '⏳';

  setTimeout(() => {
    // Reveal
    const yd = document.getElementById('youDisplay');
    const cd = document.getElementById('cpuDisplay');
    yd.textContent = EMOJIS[choice];
    cd.textContent = EMOJIS[cpu];
    yd.classList.remove('reveal'); void yd.offsetWidth; yd.classList.add('reveal');
    cd.classList.remove('reveal'); void cd.offsetWidth; cd.classList.add('reveal');

    // Determine outcome
    let outcome;
    if (choice === cpu) outcome = 'draw';
    else if (BEATS[choice] === cpu) outcome = 'win';
    else outcome = 'lose';

    const resultEl = document.getElementById('result');
    if (outcome === 'win') {
      youScore++;
      document.getElementById('youScore').textContent = youScore;
      resultEl.className = 'result-win';
      resultEl.textContent = 'You Win! 🎉';
      document.getElementById('pip' + roundNum).classList.add('won');
    } else if (outcome === 'lose') {
      cpuScore++;
      document.getElementById('cpuScore').textContent = cpuScore;
      resultEl.className = 'result-lose';
      resultEl.textContent = 'CPU Wins! 🤖';
      document.getElementById('pip' + roundNum).classList.add('lost');
    } else {
      tieScore++;
      document.getElementById('tieScore').textContent = tieScore;
      resultEl.className = 'result-draw';
      resultEl.textContent = "It's a Tie! 🤝";
    }
    if (outcome !== 'draw') roundNum++;

    // Check match over (first to 3)
    if (youScore >= 3 || cpuScore >= 3) {
      matchOver = true;
      setTimeout(() => {
        const mr = document.getElementById('matchResult');
        if (youScore > cpuScore) { mr.textContent = '🏆 You win the match!'; }
        else { mr.textContent = '😢 CPU wins the match!'; }
        document.getElementById('newMatchBtn').style.display = '';
      }, 600);
    } else {
      setTimeout(() => setChoicesDisabled(false), 800);
    }
  }, 600);
}

function setChoicesDisabled(disabled) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.toggle('disabled', disabled);
  });
}

newMatch();
</script>
</body>
</html>
