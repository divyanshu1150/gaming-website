<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #a78bfa;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .scoreboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }
  .score-box {
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 10px;
    padding: 10px 24px;
    text-align: center;
  }
  .score-label {
    font-size: 0.75rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-value {
    font-size: 1.8rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .score-box.wins .score-value  { color: #4ade80; }
  .score-box.losses .score-value { color: #f87171; }
  .score-box.draws .score-value  { color: #fbbf24; }

  .status {
    font-size: 1.1rem;
    margin-bottom: 16px;
    height: 28px;
    color: #c4b5fd;
    font-weight: 500;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: min(330px, 90vw);
    margin-bottom: 24px;
  }
  .cell {
    aspect-ratio: 1;
    background: #1a1a2e;
    border: 2px solid #2d2d4e;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    user-select: none;
  }
  .cell:hover:not(.taken) {
    background: #252540;
    border-color: #4c4c7f;
    transform: scale(1.04);
  }
  .cell.taken { cursor: default; }
  .cell.x { color: #818cf8; }
  .cell.o { color: #f472b6; }
  .cell.winner {
    background: #1e1b4b;
    border-color: #818cf8;
    animation: pulse 0.5s ease-in-out 3;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .cell.pop {
    animation: pop 0.2s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .btn {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 1px;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }
</style>
</head>
<body>
<h1>TIC-TAC-TOE</h1>
<p class="subtitle">You are X &mdash; AI is O (Minimax)</p>

<div class="scoreboard">
  <div class="score-box wins">
    <div class="score-label">Wins</div>
    <div class="score-value" id="wins">0</div>
  </div>
  <div class="score-box draws">
    <div class="score-label">Draws</div>
    <div class="score-value" id="draws">0</div>
  </div>
  <div class="score-box losses">
    <div class="score-label">Losses</div>
    <div class="score-value" id="losses">0</div>
  </div>
</div>

<div class="status" id="status">Your turn (X)</div>

<div class="board" id="board">
  <!-- 9 cells generated by JS -->
</div>

<button class="btn" id="restartBtn" onclick="startGame()">New Game</button>

<script>
  // ---- State ----
  let board = Array(9).fill(null); // null | 'X' | 'O'
  let gameOver = false;
  let scores = { wins: 0, draws: 0, losses: 0 };

  // Win combinations
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diags
  ];

  // ---- Init board DOM ----
  function buildBoard() {
    const container = document.getElementById('board');
    container.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;
      cell.addEventListener('click', () => handleClick(i));
      container.appendChild(cell);
    }
  }

  function startGame() {
    board = Array(9).fill(null);
    gameOver = false;
    buildBoard();
    setStatus('Your turn (X)');
  }

  // ---- Player click ----
  function handleClick(i) {
    if (gameOver || board[i]) return;
    place(i, 'X');
    const result = checkResult();
    if (result) { endGame(result); return; }
    setStatus('AI thinking…');
    // Small delay so UI updates before AI runs
    setTimeout(() => {
      const aiMove = getBestMove();
      place(aiMove, 'O');
      const res2 = checkResult();
      if (res2) { endGame(res2); return; }
      setStatus('Your turn (X)');
    }, 120);
  }

  function place(i, mark) {
    board[i] = mark;
    const cell = document.querySelector(`.cell[data-i="${i}"]`);
    cell.textContent = mark;
    cell.classList.add('taken', mark.toLowerCase(), 'pop');
  }

  // ---- Result check ----
  function checkResult() {
    for (const combo of WINS) {
      const [a,b,c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], combo };
      }
    }
    if (board.every(v => v)) return { winner: null }; // draw
    return null;
  }

  function endGame(result) {
    gameOver = true;
    if (result.combo) {
      result.combo.forEach(i => {
        document.querySelector(`.cell[data-i="${i}"]`).classList.add('winner');
      });
    }
    if (result.winner === 'X') {
      scores.wins++;
      setStatus('You win! 🎉');
    } else if (result.winner === 'O') {
      scores.losses++;
      setStatus('AI wins! 🤖');
    } else {
      scores.draws++;
      setStatus("It's a draw! 🤝");
    }
    document.getElementById('wins').textContent = scores.wins;
    document.getElementById('draws').textContent = scores.draws;
    document.getElementById('losses').textContent = scores.losses;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // ---- Minimax AI ----
  function getBestMove() {
    let bestScore = -Infinity;
    let bestMove = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false, -Infinity, Infinity);
        board[i] = null;
        if (score > bestScore) { bestScore = score; bestMove = i; }
      }
    }
    return bestMove;
  }

  function minimax(b, depth, isMax, alpha, beta) {
    const res = checkResult();
    if (res) {
      if (res.winner === 'O') return 10 - depth;
      if (res.winner === 'X') return depth - 10;
      return 0; // draw
    }
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, depth+1, false, alpha, beta));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, depth+1, true, alpha, beta));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  // Start on load
  startGame();
</script>
</body>
</html>
