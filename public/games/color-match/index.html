<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Match</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: #a78bfa;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 0.8rem; color: #4b5563; margin-bottom: 18px; text-align: center; }

  /* Score row */
  .score-row {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  .score-box {
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 10px;
    padding: 8px 22px;
    text-align: center;
  }
  .score-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .score-value { font-size: 1.5rem; font-weight: 700; color: #c4b5fd; }

  /* Timer bar */
  .timer-wrap {
    width: min(380px, 92vw);
    height: 10px;
    background: #1a1a2e;
    border-radius: 5px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  #timerBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    border-radius: 5px;
    transition: width 0.1s linear;
  }
  #timerBar.warning { background: linear-gradient(90deg, #f87171, #fbbf24); }

  /* Stroop display */
  .stroop-area {
    width: min(380px, 92vw);
    background: #1a1a2e;
    border: 2px solid #2d2d4e;
    border-radius: 16px;
    padding: 30px 20px;
    text-align: center;
    margin-bottom: 12px;
  }
  .instruction {
    font-size: 0.75rem;
    color: #4b5563;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  #wordDisplay {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: 4px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Flash feedback */
  .stroop-area.correct { animation: flashGreen 0.25s ease; }
  .stroop-area.wrong   { animation: flashRed 0.25s ease; }
  @keyframes flashGreen {
    0%,100% { border-color: #2d2d4e; }
    50%      { border-color: #4ade80; background: #052e16; }
  }
  @keyframes flashRed {
    0%,100% { border-color: #2d2d4e; }
    50%      { border-color: #f87171; background: #450a0a; }
  }

  /* Answer buttons */
  .answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: min(380px, 92vw);
    margin-bottom: 16px;
  }
  .answer-btn {
    padding: 18px 10px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }
  .answer-btn:hover  { transform: scale(1.05); filter: brightness(1.15); }
  .answer-btn:active { transform: scale(0.95); }
  .answer-btn.disabled { pointer-events: none; opacity: 0.5; }

  #feedback {
    font-size: 1rem;
    font-weight: 700;
    min-height: 26px;
    margin-bottom: 10px;
  }
  .fb-correct { color: #4ade80; }
  .fb-wrong   { color: #f87171; }

  .btn {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn:hover { opacity: 0.85; }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,21,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 10;
  }
  #overlay h2 { font-size: 2rem; color: #a78bfa; }
  #overlay .big { font-size: 1.4rem; color: #fbbf24; font-weight: 700; }
  #overlay p { color: #9ca3af; font-size: 0.9rem; }
  #overlay.hidden { display: none; }
</style>
</head>
<body>
<h1>COLOR MATCH</h1>
<p class="subtitle">Click the button that matches the FONT COLOR<br>(ignore what the word says!)</p>

<div class="score-row">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="best">0</div>
  </div>
</div>

<div class="timer-wrap">
  <div id="timerBar"></div>
</div>

<div class="stroop-area" id="stroopArea">
  <div class="instruction">What color is the FONT?</div>
  <div id="wordDisplay">?</div>
</div>

<div class="answer-grid" id="answerGrid"></div>

<div id="feedback"></div>

<div id="overlay">
  <h2>COLOR MATCH</h2>
  <p>Match the font color — ignore the word!</p>
  <p>30 seconds &bull; +1 correct, -1 wrong</p>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<script>
// ---- Colors ----
const COLORS = [
  { name: 'RED',    hex: '#f87171' },
  { name: 'GREEN',  hex: '#4ade80' },
  { name: 'BLUE',   hex: '#60a5fa' },
  { name: 'YELLOW', hex: '#fbbf24' },
  { name: 'PURPLE', hex: '#c084fc' },
  { name: 'ORANGE', hex: '#fb923c' },
];

const TOTAL_TIME = 30;
let score, best, timeLeft, timerInterval, gameActive, correctColor;
best = parseInt(localStorage.getItem('colorMatchBest') || '0');
document.getElementById('best').textContent = best;

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  score = 0; timeLeft = TOTAL_TIME; gameActive = true;
  document.getElementById('score').textContent = 0;
  document.getElementById('feedback').textContent = '';
  updateTimerBar();
  nextRound();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); }
    updateTimerBar();
  }, 100);
}

function updateTimerBar() {
  const bar = document.getElementById('timerBar');
  bar.style.width = (timeLeft / TOTAL_TIME * 100) + '%';
  bar.className = timeLeft < 8 ? 'warning' : '';
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function nextRound() {
  if (!gameActive) return;
  // Pick word (what it says) and font color (separate)
  const shuffled = shuffle([...COLORS]);
  const wordColor = shuffled[0];   // what the word says
  correctColor = shuffled[1];      // actual font color (different from word)

  // Occasionally make them the same for extra challenge
  const fontColor = Math.random() < 0.25 ? wordColor : correctColor;
  if (Math.random() < 0.25) correctColor = wordColor;

  // Reset correctColor to fontColor's object
  // Actually: font color IS the correct answer always
  // Let's re-clarify: word text = wordColor.name, font color = fontColor
  // Player must identify fontColor
  correctColor = fontColor;

  document.getElementById('wordDisplay').textContent = wordColor.name;
  document.getElementById('wordDisplay').style.color = fontColor.hex;

  // Build 4 answer buttons: include the correct one + 3 random others
  const answerColors = [fontColor];
  const others = shuffle(COLORS.filter(c => c.name !== fontColor.name));
  answerColors.push(...others.slice(0, 3));
  shuffle(answerColors);

  const grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  answerColors.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c.name;
    btn.style.background = c.hex + '22';
    btn.style.color = c.hex;
    btn.style.borderColor = c.hex + '55';
    btn.addEventListener('click', () => handleAnswer(c));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen) {
  if (!gameActive) return;
  const correct = chosen.name === correctColor.name;
  const fb = document.getElementById('feedback');
  const area = document.getElementById('stroopArea');

  if (correct) {
    score++;
    fb.textContent = '+1 Correct!';
    fb.className = 'fb-correct';
    area.classList.remove('correct','wrong');
    void area.offsetWidth;
    area.classList.add('correct');
  } else {
    score = Math.max(0, score - 1);
    fb.textContent = '-1 Wrong! It was ' + correctColor.name;
    fb.className = 'fb-wrong';
    area.classList.remove('correct','wrong');
    void area.offsetWidth;
    area.classList.add('wrong');
  }
  document.getElementById('score').textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('colorMatchBest', best);
    document.getElementById('best').textContent = best;
  }
  setTimeout(nextRound, 200);
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h2>TIME'S UP!</h2>
    <p class="big">Score: ${score}</p>
    <p>Best: ${best}</p>
    <button class="btn" onclick="startGame()">Play Again</button>`;
  ov.classList.remove('hidden');
}
</script>
</body>
</html>
