<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px 12px;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .difficulty {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .diff-btn {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1.5px solid #7c3aed;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .diff-btn:hover, .diff-btn.active {
    background: #7c3aed; color: #fff;
  }
  .hud {
    display: flex; gap: 30px; margin-bottom: 14px;
  }
  .hud-item { text-align: center; }
  .hud-label { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: #8b5cf6; }
  .hud-val { font-size: 1.4rem; font-weight: 700; font-family: monospace; }
  #grid {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
  }
  .card {
    width: 70px; height: 70px;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    border-radius: 10px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back {
    background: linear-gradient(135deg, #1e1340, #2d1f5e);
    border: 2px solid #7c3aed;
    font-size: 1.6rem;
    color: #4c1d95;
    font-weight: 900;
  }
  .card-back::after {
    content: '?';
    font-size: 1.4rem;
    color: #7c3aed;
  }
  .card-front {
    background: linear-gradient(135deg, #2d1f5e, #4c1d95);
    border: 2px solid #8b5cf6;
    font-size: 2rem;
    transform: rotateY(180deg);
  }
  .card.matched .card-front {
    background: linear-gradient(135deg, #1c4532, #166534);
    border-color: #4ade80;
    box-shadow: 0 0 12px rgba(74,222,128,0.4);
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,26,0.93);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #overlay h2 {
    font-size: 2.4rem; font-weight: 800; margin-bottom: 10px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #overlay p { color: #d1d5db; margin-bottom: 6px; font-size: 1rem; text-align: center; }
  .stat-row { display: flex; gap: 30px; margin: 16px 0; }
  .stat { text-align: center; }
  .stat-l { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #8b5cf6; }
  .stat-v { font-size: 2rem; font-weight: 900; color: #fff; }
  .btn {
    background: linear-gradient(135deg, #7c3aed, #8b5cf6);
    color: #fff; border: none; padding: 13px 36px;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; border-radius: 8px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }

  @media (max-width: 500px) {
    .card { width: 56px; height: 56px; }
    .card-front { font-size: 1.5rem; }
  }
  @media (max-width: 380px) {
    .card { width: 46px; height: 46px; }
    .card-front { font-size: 1.2rem; }
    #grid { gap: 7px; }
  }
</style>
</head>
<body>
<h1>Memory Match</h1>
<div class="difficulty">
  <button class="diff-btn active" data-rows="4" data-cols="4">4×4</button>
  <button class="diff-btn" data-rows="4" data-cols="6">4×6</button>
  <button class="diff-btn" data-rows="6" data-cols="6">6×6</button>
</div>
<div class="hud">
  <div class="hud-item"><div class="hud-label">Moves</div><div class="hud-val" id="movesEl">0</div></div>
  <div class="hud-item"><div class="hud-label">Time</div><div class="hud-val" id="timeEl">0:00</div></div>
  <div class="hud-item"><div class="hud-label">Pairs</div><div class="hud-val" id="pairsEl">0/8</div></div>
</div>
<div id="grid"></div>

<div id="overlay">
  <h2 id="ovTitle">MEMORY MATCH</h2>
  <p id="ovMsg">Find all matching pairs!</p>
  <div class="stat-row" id="statRow" style="display:none">
    <div class="stat"><div class="stat-l">Time</div><div class="stat-v" id="winTime">-</div></div>
    <div class="stat"><div class="stat-l">Moves</div><div class="stat-v" id="winMoves">-</div></div>
  </div>
  <button class="btn" id="startBtn">Start Game</button>
</div>

<script>
const EMOJIS_ALL = ['🎮','🎲','🎯','🎸','🎺','🎻','🎹','🎳','🃏','🎭','🎨','🎪','🏆','🎫','🎬','🎠','🎡','🎢'];
const grid = document.getElementById('grid');
const movesEl = document.getElementById('movesEl');
const timeEl = document.getElementById('timeEl');
const pairsEl = document.getElementById('pairsEl');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');
const ovMsg = document.getElementById('ovMsg');
const statRow = document.getElementById('statRow');
const winTime = document.getElementById('winTime');
const winMoves = document.getElementById('winMoves');
const startBtn = document.getElementById('startBtn');

let rows = 4, cols = 4;
let cards, flipped, matched, moves, timerInterval, elapsed, canFlip, totalPairs;

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rows = +btn.dataset.rows;
    cols = +btn.dataset.cols;
    newGame();
  });
});

startBtn.addEventListener('click', () => { overlay.style.display = 'none'; newGame(); });

function newGame() {
  clearInterval(timerInterval);
  elapsed = 0; moves = 0; flipped = []; matched = 0; canFlip = true;
  totalPairs = (rows * cols) / 2;
  movesEl.textContent = '0';
  timeEl.textContent = '0:00';
  pairsEl.textContent = `0/${totalPairs}`;

  const emojis = EMOJIS_ALL.slice(0, totalPairs);
  const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

  grid.style.gridTemplateColumns = `repeat(${cols}, auto)`;
  grid.innerHTML = '';
  cards = [];

  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-back"></div>
        <div class="card-front">${emoji}</div>
      </div>`;
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.addEventListener('click', onCardClick);
    grid.appendChild(card);
    cards.push(card);
  });

  timerInterval = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    timeEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
  }, 1000);
}

function onCardClick() {
  if (!canFlip) return;
  if (this.classList.contains('flipped') || this.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  this.classList.add('flipped');
  flipped.push(this);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;
    canFlip = false;
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      setTimeout(() => {
        a.classList.remove('flipped'); a.classList.add('matched');
        b.classList.remove('flipped'); b.classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched}/${totalPairs}`;
        flipped = [];
        canFlip = true;
        if (matched === totalPairs) endGame();
      }, 500);
    } else {
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        canFlip = true;
      }, 900);
    }
  }
}

function endGame() {
  clearInterval(timerInterval);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  const timeStr = `${m}:${String(s).padStart(2, '0')}`;
  setTimeout(() => {
    ovTitle.textContent = 'You Won! 🎉';
    ovMsg.textContent = 'All pairs matched!';
    statRow.style.display = 'flex';
    winTime.textContent = timeStr;
    winMoves.textContent = moves;
    startBtn.textContent = 'Play Again';
    overlay.style.display = 'flex';
  }, 600);
}
</script>
</body>
</html>
