<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
    overflow: hidden;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: #a78bfa;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .hud {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
  }
  .hud-box { text-align: center; }
  .hud-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .hud-value { font-size: 1.2rem; font-weight: 700; color: #fbbf24; }

  #gameCanvas {
    border: 2px solid #2d2d4e;
    border-radius: 8px;
    display: block;
    background: #0d0d1a;
    touch-action: none;
  }

  /* Mobile buttons */
  .touch-controls {
    display: none;
    gap: 12px;
    margin-top: 10px;
    align-items: center;
  }
  .touch-btn {
    background: rgba(26,26,46,0.9);
    border: 2px solid #3d3d6e;
    border-radius: 12px;
    color: #c4b5fd;
    font-size: 1.5rem;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .touch-btn:active { background: rgba(44,44,80,0.95); }
  .jump-btn { width: 80px; height: 80px; font-size: 1.8rem; background: rgba(109,40,217,0.5); }

  @media (max-width: 600px) {
    .touch-controls { display: flex; }
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,21,0.9);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 10;
  }
  #overlay h2 { font-size: 2rem; color: #a78bfa; }
  #overlay .big { font-size: 1.3rem; color: #fbbf24; font-weight: 700; }
  #overlay p { color: #6b7280; font-size: 0.9rem; }
  #overlay.hidden { display: none; }
  .btn {
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<h1>PLATFORMER</h1>
<div class="hud">
  <div class="hud-box">
    <div class="hud-label">Coins</div>
    <div class="hud-value" id="coins">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Best</div>
    <div class="hud-value" id="best">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Distance</div>
    <div class="hud-value" id="dist">0</div>
  </div>
</div>
<canvas id="gameCanvas"></canvas>
<div class="touch-controls">
  <div class="touch-btn" id="btnLeft">◀</div>
  <div class="touch-btn jump-btn" id="btnJump">↑</div>
  <div class="touch-btn" id="btnRight">▶</div>
</div>

<div id="overlay">
  <h2>PLATFORMER</h2>
  <p>Collect coins, don't fall!</p>
  <p>Arrow keys / WASD &bull; Touch buttons on mobile</p>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  const w = Math.min(window.innerWidth - 24, 640);
  const h = Math.min(window.innerHeight * 0.55, 380);
  canvas.width = w; canvas.height = h;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ---- Constants ----
const GRAVITY = 0.5;
const JUMP_FORCE = -11;
const PLAYER_W = 24, PLAYER_H = 32;
const PLATFORM_H = 14;
const COIN_R = 8;
const SCROLL_SPEED_BASE = 3;

// ---- State ----
let player, platforms, coins, scrollX, score, dist, best, running, keys;
best = parseInt(localStorage.getItem('platformerBest') || '0');
document.getElementById('best').textContent = best;

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  scrollX = 0; score = 0; dist = 0;
  keys = {};
  player = {
    x: 80, y: 100,
    vx: 0, vy: 0,
    onGround: false,
    color: '#818cf8'
  };
  // Starting platforms
  platforms = [
    { x: 0, y: canvas.height - 60, w: 300, h: PLATFORM_H },
    { x: 340, y: canvas.height - 80, w: 160, h: PLATFORM_H },
    { x: 540, y: canvas.height - 110, w: 140, h: PLATFORM_H },
  ];
  coins = [];
  running = true;
  spawnInitialCoins();
  requestAnimationFrame(loop);
}

function spawnInitialCoins() {
  platforms.forEach(p => spawnCoinOnPlatform(p));
}

function spawnCoinOnPlatform(p) {
  const count = Math.floor(p.w / 50);
  for (let i = 0; i < count; i++) {
    coins.push({
      x: p.x + 30 + i * 50,
      y: p.y - COIN_R - 4,
      collected: false
    });
  }
}

// ---- Platform generation ----
function generatePlatforms() {
  const lastX = Math.max(...platforms.map(p => p.x + p.w));
  const screenRight = scrollX + canvas.width;
  if (lastX < screenRight + 200) {
    const gap = 60 + Math.random() * 100;
    const w = 100 + Math.random() * 160;
    const y = canvas.height - 50 - Math.random() * (canvas.height * 0.45);
    const p = { x: lastX + gap, y, w, h: PLATFORM_H };
    platforms.push(p);
    spawnCoinOnPlatform(p);
  }
  // Cleanup off-screen
  platforms = platforms.filter(p => p.x + p.w > scrollX - 100);
  coins = coins.filter(c => c.x > scrollX - 50);
}

// ---- Physics ----
function update() {
  const speed = SCROLL_SPEED_BASE + dist * 0.0004;
  scrollX += speed;
  dist = Math.floor(scrollX / 40);
  document.getElementById('dist').textContent = dist;

  // Player horizontal
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.vx = -4;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = 4;
  else player.vx *= 0.8;

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  // Platform collisions
  platforms.forEach(p => {
    const px = p.x - scrollX;
    if (player.x + PLAYER_W > px &&
        player.x < px + p.w &&
        player.y + PLAYER_H > p.y &&
        player.y + PLAYER_H < p.y + p.h + 12 &&
        player.vy >= 0) {
      player.y = p.y - PLAYER_H;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // Jump
  if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }

  // Coin collection
  coins.forEach(c => {
    if (c.collected) return;
    const cx = c.x - scrollX;
    if (Math.abs(cx + COIN_R - player.x - PLAYER_W/2) < COIN_R + PLAYER_W/2 &&
        Math.abs(c.y - player.y - PLAYER_H/2) < COIN_R + PLAYER_H/2) {
      c.collected = true;
      score++;
      document.getElementById('coins').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('platformerBest', best);
        document.getElementById('best').textContent = best;
      }
    }
  });

  // Left wall
  if (player.x - scrollX < 0) player.x = scrollX;

  // Fall off screen
  if (player.y > canvas.height + 40) {
    gameOver();
  }

  generatePlatforms();
}

// ---- Rendering ----
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background stars
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw platforms
  platforms.forEach(p => {
    const px = p.x - scrollX;
    // Main platform
    ctx.fillStyle = '#3730a3';
    ctx.beginPath();
    ctx.roundRect(px, p.y, p.w, p.h, 4);
    ctx.fill();
    // Top highlight
    ctx.fillStyle = '#4f46e5';
    ctx.fillRect(px+2, p.y, p.w-4, 4);
  });

  // Draw coins
  coins.forEach(c => {
    if (c.collected) return;
    const cx = c.x - scrollX;
    ctx.beginPath();
    ctx.arc(cx, c.y, COIN_R, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(cx-2, c.y-2, 1, cx, c.y, COIN_R);
    grad.addColorStop(0, '#fef08a');
    grad.addColorStop(1, '#ca8a04');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#854d0e';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Draw player
  const px = player.x - scrollX;
  ctx.save();
  // Body
  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.roundRect(px, player.y, PLAYER_W, PLAYER_H, 5);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px+7, player.y+8, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+17, player.y+8, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(px+8, player.y+8, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+18, player.y+8, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Speed indicator
  const speed = SCROLL_SPEED_BASE + dist * 0.0004;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(8, 8, Math.min(speed * 20, canvas.width - 16), 4);
}

function gameOver() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h2>GAME OVER</h2>
    <p class="big">Coins: ${score}</p>
    <p>Distance: ${dist} &bull; Best: ${best} coins</p>
    <button class="btn" onclick="startGame()">Play Again</button>`;
  ov.classList.remove('hidden');
}

// ---- Loop ----
function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ---- Touch buttons ----
function addTouch(id, key) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { keys[key] = true; e.preventDefault(); }, {passive:false});
  btn.addEventListener('touchend',   e => { keys[key] = false; e.preventDefault(); }, {passive:false});
  btn.addEventListener('mousedown',  () => keys[key] = true);
  btn.addEventListener('mouseup',    () => keys[key] = false);
}
addTouch('btnLeft', 'ArrowLeft');
addTouch('btnRight', 'ArrowRight');
addTouch('btnJump', 'ArrowUp');
</script>
</body>
</html>
