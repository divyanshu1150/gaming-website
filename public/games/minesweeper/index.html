<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px 10px;
    overflow-x: hidden;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
  }
  .difficulty {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .diff-btn {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1.5px solid #7c3aed;
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .diff-btn:hover, .diff-btn.active {
    background: #7c3aed;
    color: #fff;
  }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(124,58,237,0.1);
    border: 1.5px solid #4c1d95;
    border-radius: 10px;
    padding: 10px 20px;
    margin-bottom: 14px;
    min-width: 260px;
    justify-content: space-between;
  }
  .status-item { text-align: center; }
  .status-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #8b5cf6; }
  .status-val { font-size: 1.3rem; font-weight: 700; font-family: monospace; }
  #faceBtn {
    font-size: 1.6rem;
    background: none;
    border: 2px solid #7c3aed;
    border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer;
    transition: transform 0.15s;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #faceBtn:hover { transform: scale(1.1); }
  #board {
    display: inline-block;
    border: 2px solid #7c3aed;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 24px rgba(124,58,237,0.35);
    user-select: none;
  }
  .row { display: flex; }
  .cell {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    border: 1px solid rgba(124,58,237,0.25);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    flex-shrink: 0;
  }
  .cell.hidden {
    background: #1e1340;
  }
  .cell.hidden:hover { background: #2d1f5e; }
  .cell.revealed {
    background: #0f0f1a;
    cursor: default;
  }
  .cell.flagged { background: #1e1340; }
  .cell.mine-hit { background: #7f1d1d; }
  .cell.mine-shown { background: #1a0a0a; }
  .n1 { color: #60a5fa; }
  .n2 { color: #4ade80; }
  .n3 { color: #f87171; }
  .n4 { color: #818cf8; }
  .n5 { color: #f97316; }
  .n6 { color: #22d3ee; }
  .n7 { color: #e879f9; }
  .n8 { color: #9ca3af; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,26,0.93);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #overlay h2 {
    font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #overlay p { color: #d1d5db; margin-bottom: 20px; font-size: 1rem; }
  .btn {
    background: linear-gradient(135deg, #7c3aed, #8b5cf6);
    color: #fff; border: none; padding: 13px 36px;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; border-radius: 8px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
  }
  .btn:hover { transform: translateY(-2px); }

  @media (max-width: 520px) {
    .cell { width: 26px; height: 26px; font-size: 0.72rem; }
  }
  @media (max-width: 380px) {
    .cell { width: 21px; height: 21px; font-size: 0.6rem; }
  }
</style>
</head>
<body>
<h1>Minesweeper</h1>
<div class="difficulty">
  <button class="diff-btn active" data-diff="easy">Easy</button>
  <button class="diff-btn" data-diff="medium">Medium</button>
  <button class="diff-btn" data-diff="hard">Hard</button>
</div>
<div class="status-bar">
  <div class="status-item">
    <div class="status-label">Mines</div>
    <div class="status-val" id="mineCount">💣 10</div>
  </div>
  <button id="faceBtn">😀</button>
  <div class="status-item">
    <div class="status-label">Time</div>
    <div class="status-val" id="timerEl">000</div>
  </div>
</div>
<div id="board"></div>

<div id="overlay">
  <h2>MINESWEEPER</h2>
  <p>Find all mines without detonating!</p>
  <button class="btn" id="startBtn">Start Game</button>
</div>

<script>
const DIFFICULTIES = {
  easy: { rows: 9, cols: 9, mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard: { rows: 16, cols: 30, mines: 99 },
};

let config = DIFFICULTIES.easy;
let grid, revealed, flagged, minePos;
let gameOver, gameWon, firstClick, timerInterval, elapsed, flagCount;
const board = document.getElementById('board');
const faceBtn = document.getElementById('faceBtn');
const mineCount = document.getElementById('mineCount');
const timerEl = document.getElementById('timerEl');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    config = DIFFICULTIES[btn.dataset.diff];
    newGame();
  });
});

faceBtn.addEventListener('click', newGame);
startBtn.addEventListener('click', () => { overlay.style.display = 'none'; newGame(); });

function newGame() {
  clearInterval(timerInterval);
  elapsed = 0;
  timerEl.textContent = '000';
  firstClick = true;
  gameOver = false;
  gameWon = false;
  flagCount = 0;
  mineCount.textContent = `💣 ${config.mines}`;
  faceBtn.textContent = '😀';

  const { rows, cols } = config;
  grid = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
  minePos = [];

  renderBoard();
}

function placeMines(safeR, safeC) {
  const { rows, cols, mines } = config;
  const cells = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (Math.abs(r - safeR) > 1 || Math.abs(c - safeC) > 1) cells.push([r, c]);

  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  minePos = cells.slice(0, mines);
  for (const [r, c] of minePos) grid[r][c] = -1;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
        }
      grid[r][c] = count;
    }
  }
}

function renderBoard() {
  const { rows, cols } = config;
  board.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell hidden';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('contextmenu', onCellRight);
      row.appendChild(cell);
    }
    board.appendChild(row);
  }
}

function getCellEl(r, c) {
  return board.children[r]?.children[c];
}

function updateCell(r, c) {
  const el = getCellEl(r, c);
  if (!el) return;
  el.className = 'cell';
  el.textContent = '';
  if (flagged[r][c] && !revealed[r][c]) {
    el.classList.add('hidden', 'flagged');
    el.textContent = '🚩';
    return;
  }
  if (!revealed[r][c]) {
    el.classList.add('hidden');
    return;
  }
  el.classList.add('revealed');
  if (grid[r][c] === -1) {
    el.classList.add('mine-hit');
    el.textContent = '💥';
    return;
  }
  if (grid[r][c] > 0) {
    el.textContent = grid[r][c];
    el.classList.add('n' + grid[r][c]);
  }
}

function onCellClick(e) {
  if (gameOver || gameWon) return;
  const r = +this.dataset.r, c = +this.dataset.c;
  if (revealed[r][c] || flagged[r][c]) return;

  faceBtn.textContent = '😮';
  setTimeout(() => { if (!gameOver && !gameWon) faceBtn.textContent = '😀'; }, 200);

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      elapsed = Math.min(elapsed + 1, 999);
      timerEl.textContent = String(elapsed).padStart(3, '0');
    }, 1000);
  }

  if (grid[r][c] === -1) {
    reveal(r, c, true);
    endGame(false);
    return;
  }
  flood(r, c);
  checkWin();
}

function onCellRight(e) {
  e.preventDefault();
  if (gameOver || gameWon || revealed[+this.dataset.r][+this.dataset.c]) return;
  const r = +this.dataset.r, c = +this.dataset.c;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  mineCount.textContent = `💣 ${config.mines - flagCount}`;
  updateCell(r, c);
}

function reveal(r, c, isMine) {
  const el = getCellEl(r, c);
  if (!el) return;
  revealed[r][c] = true;
  el.className = 'cell ' + (isMine ? 'mine-hit' : 'revealed');
  el.textContent = isMine ? '💥' : (grid[r][c] > 0 ? grid[r][c] : '');
  if (!isMine && grid[r][c] > 0) el.classList.add('n' + grid[r][c]);
}

function flood(r, c) {
  const { rows, cols } = config;
  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    if (cr < 0 || cr >= rows || cc < 0 || cc >= cols) continue;
    if (revealed[cr][cc] || flagged[cr][cc]) continue;
    reveal(cr, cc, false);
    if (grid[cr][cc] === 0) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if (dr || dc) stack.push([cr + dr, cc + dc]);
    }
  }
}

function checkWin() {
  const { rows, cols, mines } = config;
  let hidden = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) hidden++;
  if (hidden === mines) endGame(true);
}

function endGame(win) {
  clearInterval(timerInterval);
  gameOver = !win;
  gameWon = win;
  faceBtn.textContent = win ? '😎' : '😵';
  if (!win) {
    for (const [r, c] of minePos) {
      if (!revealed[r][c]) {
        const el = getCellEl(r, c);
        if (el) { el.className = 'cell mine-shown'; el.textContent = '💣'; }
      }
    }
  }
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    ov.querySelector('h2').textContent = win ? 'YOU WIN! 😎' : 'BOOM! 💥';
    ov.querySelector('p').textContent = win
      ? `Cleared in ${elapsed}s with ${config.mines} mines!`
      : 'You hit a mine! Try again.';
    document.getElementById('startBtn').textContent = 'Play Again';
    ov.style.display = 'flex';
  }, 800);
}
</script>
</body>
</html>
