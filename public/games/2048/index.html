<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 2.4rem;
    font-weight: 900;
    color: #fbbf24;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
    width: min(360px, 96vw);
    justify-content: space-between;
  }
  .score-row {
    display: flex;
    gap: 10px;
  }
  .score-box {
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 8px;
    padding: 6px 16px;
    text-align: center;
    min-width: 80px;
  }
  .score-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
  .score-value { font-size: 1.3rem; font-weight: 700; color: #fbbf24; }
  .btn {
    background: linear-gradient(135deg, #b45309, #d97706);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .hint { font-size: 0.75rem; color: #4b5563; margin-bottom: 12px; }

  /* Board */
  .board-wrap {
    background: #1a1228;
    border-radius: 14px;
    padding: 10px;
    width: min(360px, 96vw);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cell-bg {
    aspect-ratio: 1;
    background: #0f0f22;
    border-radius: 8px;
  }
  .tile-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
  }
  /* Tiles are absolutely positioned over the grid using JS */
  #tile-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .board-wrap { position: relative; }
  .tile {
    position: absolute;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    transition: top 0.1s ease, left 0.1s ease;
  }
  /* Tile colors by value */
  .t2    { background:#1e1b4b; color:#e0e0ff; }
  .t4    { background:#2e1b6b; color:#e0e0ff; }
  .t8    { background:#7c3aed; color:#fff; }
  .t16   { background:#6d28d9; color:#fff; }
  .t32   { background:#db2777; color:#fff; }
  .t64   { background:#dc2626; color:#fff; }
  .t128  { background:#d97706; color:#fff; }
  .t256  { background:#ca8a04; color:#fff; }
  .t512  { background:#16a34a; color:#fff; }
  .t1024 { background:#0891b2; color:#fff; }
  .t2048 { background:#fbbf24; color:#1a1a00; }
  .t-big { background:#f0fdf4; color:#1a1a00; }
  @keyframes tileAppear {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes tileMerge {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .new-tile   { animation: tileAppear 0.15s ease-out; }
  .merge-tile { animation: tileMerge 0.2s ease-out; }

  #message {
    margin-top: 16px;
    font-size: 1.1rem;
    color: #a78bfa;
    font-weight: 600;
    min-height: 28px;
  }
</style>
</head>
<body>
<h1>2048</h1>
<div class="header">
  <div class="score-row">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>
  <button class="btn" onclick="newGame()">New Game</button>
</div>
<p class="hint">Arrow keys / WASD or swipe to play</p>

<div class="board-wrap" id="boardWrap">
  <div class="grid" id="bgGrid"></div>
  <div id="tile-layer"></div>
</div>
<div id="message"></div>

<script>
const N = 4;
let grid, score, best, won, over;

// Load best from localStorage
best = parseInt(localStorage.getItem('2048best') || '0');
document.getElementById('best').textContent = best;

function newGame() {
  grid = Array.from({length: N}, () => Array(N).fill(0));
  score = 0; won = false; over = false;
  document.getElementById('score').textContent = 0;
  document.getElementById('message').textContent = '';
  addRandom(); addRandom();
  render();
}

// ---- Grid helpers ----
function addRandom() {
  const empty = [];
  grid.forEach((row, r) => row.forEach((v, c) => { if (!v) empty.push([r,c]); }));
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r,c];
}

function slide(row) {
  // Remove zeros, merge, re-pad
  let arr = row.filter(v => v), gained = 0;
  for (let i = 0; i < arr.length-1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2; gained += arr[i]; arr[i+1] = 0;
    }
  }
  arr = arr.filter(v => v);
  while (arr.length < N) arr.push(0);
  return { row: arr, gained };
}

function move(dir) {
  if (over) return;
  let moved = false;
  const orig = grid.map(r => [...r]);

  if (dir === 'left' || dir === 'right') {
    for (let r = 0; r < N; r++) {
      let row = dir === 'right' ? [...grid[r]].reverse() : [...grid[r]];
      const {row: newRow, gained} = slide(row);
      if (dir === 'right') newRow.reverse();
      if (newRow.some((v,i) => v !== grid[r][i])) moved = true;
      grid[r] = newRow; score += gained;
    }
  } else {
    for (let c = 0; c < N; c++) {
      let col = grid.map(r => r[c]);
      if (dir === 'down') col = col.reverse();
      const {row: newCol, gained} = slide(col);
      if (dir === 'down') newCol.reverse();
      newCol.forEach((v,r) => { if (v !== grid[r][c]) moved = true; grid[r][c] = v; });
      score += gained;
    }
  }

  if (moved) {
    if (score > best) { best = score; localStorage.setItem('2048best', best); }
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
    addRandom();
    render();
    checkState();
  }
}

function checkState() {
  // Check win (2048 tile exists)
  let has2048 = grid.some(r => r.some(v => v === 2048));
  if (has2048 && !won) {
    won = true;
    document.getElementById('message').textContent = 'You reached 2048! Keep going!';
  }
  // Check game over
  let canMove = false;
  for (let r = 0; r < N && !canMove; r++) {
    for (let c = 0; c < N && !canMove; c++) {
      if (!grid[r][c]) { canMove = true; break; }
      if (c < N-1 && grid[r][c] === grid[r][c+1]) canMove = true;
      if (r < N-1 && grid[r][c] === grid[r+1][c]) canMove = true;
    }
  }
  if (!canMove) {
    over = true;
    document.getElementById('message').textContent = 'Game Over! No moves left.';
  }
}

// ---- Rendering ----
let cellSize = 0, gap = 8, pad = 10;

function calcCellSize() {
  const bw = document.getElementById('boardWrap').clientWidth;
  cellSize = (bw - pad*2 - gap*(N-1)) / N;
}

function tileClass(v) {
  if (v === 2)    return 't2';
  if (v === 4)    return 't4';
  if (v === 8)    return 't8';
  if (v === 16)   return 't16';
  if (v === 32)   return 't32';
  if (v === 64)   return 't64';
  if (v === 128)  return 't128';
  if (v === 256)  return 't256';
  if (v === 512)  return 't512';
  if (v === 1024) return 't1024';
  if (v === 2048) return 't2048';
  return 't-big';
}

function fontSize(v) {
  const s = cellSize;
  if (v < 100)  return s * 0.45;
  if (v < 1000) return s * 0.38;
  return s * 0.3;
}

function render() {
  calcCellSize();
  const layer = document.getElementById('tile-layer');
  layer.innerHTML = '';

  // Position tile-layer over board
  const bw = document.getElementById('boardWrap');
  layer.style.top = pad + 'px';
  layer.style.left = pad + 'px';
  layer.style.width = (bw.clientWidth - pad*2) + 'px';
  layer.style.height = (bw.clientWidth - pad*2) + 'px';
  layer.style.position = 'absolute';

  grid.forEach((row, r) => {
    row.forEach((v, c) => {
      if (!v) return;
      const tile = document.createElement('div');
      tile.className = 'tile new-tile ' + tileClass(v);
      tile.textContent = v;
      tile.style.width = cellSize + 'px';
      tile.style.height = cellSize + 'px';
      tile.style.top = (r * (cellSize + gap)) + 'px';
      tile.style.left = (c * (cellSize + gap)) + 'px';
      tile.style.fontSize = fontSize(v) + 'px';
      layer.appendChild(tile);
    });
  });
}

// Build static background cells
function buildBg() {
  const bg = document.getElementById('bgGrid');
  bg.innerHTML = '';
  for (let i = 0; i < N*N; i++) {
    const d = document.createElement('div');
    d.className = 'cell-bg';
    bg.appendChild(d);
  }
}

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  const map = {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down',
    A:'left', D:'right', W:'up', S:'down'
  };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// ---- Touch / swipe ----
let tx0, ty0;
document.getElementById('boardWrap').addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; e.preventDefault();
}, {passive: false});
document.getElementById('boardWrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
  e.preventDefault();
}, {passive: false});

window.addEventListener('resize', render);

buildBg();
newGame();
</script>
</body>
</html>
